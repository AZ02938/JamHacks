<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000dff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Course Tracker</h1>

    <button onclick="sayHello()">Link To Wikipedia</button>

    <script>
        function sayHello() {
            <a href="https://wikipedia.org">Visit Wikipedia</a>
        }
    </script>

</body>
</html>
